<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FacilityOS AI v4</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#09090b;--panel:rgba(24,24,27,.86);--line:rgba(255,255,255,.10);--text:#f8fafc;--muted:#a1a1aa;--accent:#ef3b1f;--accent2:#ff5a2e;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--r:22px;--shadow:0 24px 80px rgba(0,0,0,.46)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 15% 10%,rgba(239,59,31,.22),transparent 30%),linear-gradient(160deg,#030304,#111114 52%,#09090b);min-height:100vh}button,input,select,textarea{font:inherit}
.app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}aside{position:sticky;top:0;height:100vh;padding:22px;border-right:1px solid var(--line);background:rgba(10,10,12,.82);backdrop-filter:blur(24px);overflow:auto;z-index:20}main{padding:26px;overflow:hidden}.logo{display:flex;gap:12px;align-items:center;margin-bottom:24px}.mark{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--accent),#ff7a4e);display:grid;place-items:center;font-weight:900}.logo strong{font-size:21px;letter-spacing:-.04em}.logo small{display:block;color:var(--muted);font-size:11px}.label{color:#71717a;font-size:11px;text-transform:uppercase;letter-spacing:.12em;margin:18px 10px 8px}
.role-switch{padding:6px;background:rgba(255,255,255,.06);border:1px solid var(--line);display:grid;gap:6px;border-radius:18px;margin-bottom:18px}.role-btn,.nav-btn{width:100%;border:0;cursor:pointer;text-align:left;color:var(--muted);background:transparent;border-radius:14px;padding:12px 13px;display:flex;gap:10px;align-items:center}.role-btn.active,.nav-btn.active{color:var(--text);background:linear-gradient(135deg,rgba(239,59,31,.24),rgba(255,255,255,.07));box-shadow:inset 0 0 0 1px rgba(239,59,31,.22)}nav{display:grid;gap:5px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.headline h1{margin:0;font-size:clamp(28px,4vw,46px);letter-spacing:-.06em}.headline p{margin:8px 0 0;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}.pill,.btn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:999px;padding:10px 14px;display:inline-flex;gap:8px;align-items:center}.btn{cursor:pointer}.btn.primary{border-color:rgba(239,59,31,.48);background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 14px 38px rgba(239,59,31,.24)}.btn.ghost{background:transparent}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);backdrop-filter:blur(26px)}.card h2,.card h3{margin:0 0 10px;letter-spacing:-.035em}.grid{display:grid;gap:16px}.metrics{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.15fr .85fr}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.num{font-size:34px;font-weight:850;letter-spacing:-.06em}.muted{color:var(--muted)}.trend{color:var(--accent2);font-size:12px;margin-top:8px}
table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:12px 8px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-size:12px}td{color:#e5e7eb}.tag{display:inline-flex;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--muted);font-size:12px}.tag.ok{background:rgba(34,197,94,.14);color:#86efac}.tag.warn{background:rgba(245,158,11,.14);color:#fcd34d}.tag.red{background:rgba(239,59,31,.16);color:#fca5a5}
.form{display:grid;gap:12px}.form-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}input,select,textarea{width:100%;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--line);border-radius:15px;padding:13px 14px;outline:none}option{background:#18181b}textarea{min-height:92px;resize:vertical}.view{display:none}.view.active{display:block}.dot{width:9px;height:9px;border-radius:50%;background:var(--red);display:inline-block}.dot.ok{background:var(--green)}.notice{padding:12px 14px;border:1px solid rgba(239,59,31,.25);background:rgba(239,59,31,.10);border-radius:16px;color:#fecaca;margin-bottom:16px}.mobilebar{display:none;position:sticky;top:0;z-index:30;padding:12px;background:rgba(9,9,11,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:15}.upload{border:1px dashed rgba(255,255,255,.22);border-radius:20px;padding:24px;text-align:center;color:var(--muted);background:rgba(255,255,255,.035)}.login{max-width:560px;margin:0 0 24px auto}
@media(max-width:980px){.app{display:block}aside{position:fixed;left:-310px;top:0;width:286px;height:100vh;transition:left .22s ease}body.menu-open aside{left:0}body.menu-open .overlay{display:block}.mobilebar{display:flex;justify-content:space-between;gap:8px}main{padding:16px}.metrics,.two,.three,.form-row{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.login{margin:0 0 18px}table{display:block;overflow-x:auto;white-space:nowrap}}
</style>
</head>
<body>
<div class="mobilebar"><button class="btn primary" onclick="openMenu()">☰ Menu</button><button class="btn ghost" onclick="cycleRole()">Switch Role</button><button class="btn ghost" onclick="loadAll()">Refresh</button></div>
<div class="overlay" onclick="closeMenu()"></div>
<div class="app">
<aside>
<div class="logo"><div class="mark">AI</div><div><strong>FacilityOS</strong><small>Cleaning + Facility Intelligence</small></div></div>
<div class="label">View as</div><div class="role-switch">
<button class="role-btn active" data-role="creator" onclick="setRole('creator')">👑 Creator / Admin</button>
<button class="role-btn" data-role="customer" onclick="setRole('customer')">🏢 Customer Portal</button>
<button class="role-btn" data-role="employee" onclick="setRole('employee')">🧽 Employee App</button>
</div>
<div class="label">Modules</div><nav id="nav"></nav>
<div class="card" style="margin-top:18px;padding:14px"><span id="connectionDot" class="dot"></span> <span id="connectionText" class="muted" style="font-size:13px">Checking Supabase...</span></div>
</aside>
<main>
<section class="card login"><h2>Workspace Login</h2><p class="muted">Supabase Auth stores login accounts in Authentication → Users. App access is stored in the profiles table.</p><div class="form"><div class="form-row"><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password"></div><div class="actions"><button class="btn primary" onclick="signUp()">Create account</button><button class="btn" onclick="signIn()">Login</button><button class="btn ghost" onclick="signOut()">Logout</button><button class="btn ghost" onclick="loadAll()">Refresh Data</button></div><small id="authMsg" class="muted"></small></div></section>
<div class="topbar"><div class="headline"><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div><div class="actions"><span class="pill" id="rolePill">👑 Creator View</span><button class="btn primary" onclick="quickAdd()">+ Quick Add</button></div></div>
<div id="dbNotice" class="notice" style="display:none"></div>
<section id="views"></section>
</main>
</div>
<script>
const SUPABASE_URL="https://sjjeqxjsspcaxommavac.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqamVxeGpzc3BjYXhvbW1hdmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjY4NDYsImV4cCI6MjA5ODgwMjg0Nn0.MIHJgK5co1NCepS9FkzLtxvCN39cOhE2N0m9RMkInM4";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let currentRole="creator",currentView="dashboard",sessionUser=null;
let data={companies:[],profiles:[],customers:[],facilities:[],areas:[],employees:[],jobs:[],checklist_items:[],inspections:[],maintenance_issues:[],quotes:[],inventory_items:[],photos:[]};
const roleNav={
 creator:[["dashboard","Dashboard"],["users","Users & Access"],["customers","Customers"],["facilities","Facilities"],["areas","Areas"],["employees","Employees"],["jobs","Jobs"],["checklists","Checklists"],["inspections","Inspections"],["maintenance","Issues"],["quotes","Quotes"],["inventory","Inventory"],["photos","Photos"],["settings","Settings"]],
 customer:[["customer-home","Overview"],["customer-jobs","Service Visits"],["customer-issues","Issues & Approvals"],["customer-reports","Reports"]],
 employee:[["employee-today","Today"],["employee-checklist","Checklist"],["employee-photos","Photos"],["employee-issues","Report Issue"],["employee-time","Time Clock"]]
};
function openMenu(){document.body.classList.add("menu-open")}function closeMenu(){document.body.classList.remove("menu-open")}
function iconFor(id){return({dashboard:"📊",users:"🔐",customers:"🤝",facilities:"🏢",areas:"🧭",employees:"👥",jobs:"🗓️",checklists:"✅",inspections:"🔎",maintenance:"🔧",quotes:"💵",inventory:"🧴",photos:"📸",settings:"⚙️","customer-home":"🏠","customer-jobs":"🧽","customer-issues":"⚠️","customer-reports":"📄","employee-today":"📍","employee-checklist":"✅","employee-photos":"📸","employee-issues":"🔧","employee-time":"⏱️"})[id]||"•"}
function setRole(role){currentRole=role;currentView=roleNav[role][0][0];document.querySelectorAll(".role-btn").forEach(b=>b.classList.toggle("active",b.dataset.role===role));document.getElementById("rolePill").textContent=role==="creator"?"👑 Creator View":role==="customer"?"🏢 Customer View":"🧽 Employee View";renderNav();renderViews();showView(currentView);closeMenu()}
function cycleRole(){const r=["creator","customer","employee"];setRole(r[(r.indexOf(currentRole)+1)%r.length])}
function renderNav(){document.getElementById("nav").innerHTML=roleNav[currentRole].map(([id,l])=>`<button class="nav-btn ${id===currentView?'active':''}" onclick="showView('${id}')" data-view="${id}"><span>${iconFor(id)}</span>${l}</button>`).join("")}
function showView(id){currentView=id;document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===id));document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===id));const t={dashboard:["Creator Command Center","Live Supabase dashboard for operations, users, and access."],users:["Users & Access","Profiles store app roles and link login users to customer or employee records."],customers:["Customers","Create and manage customer accounts."],facilities:["Facilities","Facilities belong to customers."],areas:["Areas","Areas belong to facilities."],employees:["Employees","Employees can be linked to login profiles."],jobs:["Jobs","Jobs link customer, facility, area, and employee."],checklists:["Checklists","Checklist items belong to jobs."],inspections:["Inspections","Inspection reports belong to jobs."],maintenance:["Maintenance Issues","Issues link to facility and area."],quotes:["Quotes","Quotes belong to maintenance issues."],inventory:["Inventory","Inventory belongs to facility."],photos:["Photos","Photos can belong to a job or issue."],settings:["Settings","Supabase connection and app setup."],"customer-home":["Customer Portal","Customer sees proof, reports, and approvals."],"customer-jobs":["Service Visits","Customer-facing visits."],"customer-issues":["Issues & Approvals","Customer sees reviewed issues and quote approvals."],"customer-reports":["Reports","Customer-facing scorecards."],"employee-today":["Employee App","Employee sees assigned jobs."],"employee-checklist":["Checklist","Employee completes tasks."],"employee-photos":["Photos","Employee uploads proof."],"employee-issues":["Report Issue","Employee reports issues by facility and area."],"employee-time":["Time Clock","Clock in/out shell."]}[id]||["FacilityOS",""];document.getElementById("pageTitle").textContent=t[0];document.getElementById("pageSubtitle").textContent=t[1];closeMenu()}
function setNotice(msg){const el=document.getElementById("dbNotice"); if(!msg){el.style.display="none";return} el.textContent=msg; el.style.display="block";}
function tag(c){let s=String(c??"");if(["active","completed","assigned","approved","creator","admin","manager","customer","employee"].includes(s.toLowerCase()))return`<span class="tag ok">${s}</span>`;if(["scheduled","draft","pending","sent"].includes(s.toLowerCase()))return`<span class="tag warn">${s}</span>`;if(["open","rejected","late"].includes(s.toLowerCase()))return`<span class="tag red">${s}</span>`;return s}
function table(headers,rows){return`<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${r.map(c=>`<td>${tag(c)}</td>`).join("")}</tr>`).join(""):`<tr><td colspan="${headers.length}" class="muted">No records yet.</td></tr>`}</tbody></table>`}
function cardMetric(label,num,trend){return`<div class="card"><div class="num">${num}</div><div class="muted">${label}</div><div class="trend">${trend}</div></div>`}
function opts(arr,labelFn){return arr.map(x=>`<option value="${x.id}">${labelFn(x)}</option>`).join("")}
function nameIn(tbl,id){return (data[tbl]||[]).find(x=>x.id===id)?.name||""}function fullName(id){return data.employees.find(x=>x.id===id)?.full_name||""}function issueTitle(id){return data.maintenance_issues.find(x=>x.id===id)?.title||""}function jobTitle(id){return data.jobs.find(x=>x.id===id)?.title||""}function profileName(id){let p=data.profiles.find(x=>x.id===id);return p?(p.full_name||p.id):""}
async function loadTable(t){const {data:rows,error}=await sb.from(t).select("*").order("created_at",{ascending:false}); if(error) throw new Error(`${t}: ${error.message}`); data[t]=rows||[];}
async function loadAll(){try{setNotice(""); const tables=["companies","profiles","customers","facilities","facility_areas","employees","jobs","checklist_items","inspections","maintenance_issues","quotes","inventory_items","photos"]; for(const t of tables){await loadTable(t)} data.areas=data.facility_areas; document.getElementById("connectionDot").className="dot ok";document.getElementById("connectionText").textContent="Supabase connected"; renderViews(); showView(currentView);}catch(e){document.getElementById("connectionDot").className="dot";document.getElementById("connectionText").textContent="DB needs update"; setNotice("Database error: "+e.message+". Run the v4 schema/migration in Supabase."); renderViews(); showView(currentView);}}
async function insertRow(table,row){const {error}=await sb.from(table).insert(row); if(error){alert(error.message); return} await loadAll(); alert("Saved.")}
async function updateProfileAccess(){let id=val("profileId"); if(!id) return alert("Select a profile."); const row={full_name:val("profileName"),role:val("profileRole"),customer_id:valOrNull("profileCustomer"),employee_id:valOrNull("profileEmployee")}; const {error}=await sb.from("profiles").update(row).eq("id",id); if(error){alert(error.message);return} await loadAll(); alert("Access updated.")}
async function createMyProfile(){if(!sessionUser) return alert("Login first."); const row={id:sessionUser.id,full_name:val("myName")||sessionUser.email,role:"creator"}; const {error}=await sb.from("profiles").upsert(row); if(error){alert(error.message);return} await loadAll(); alert("Profile created/updated.")}
function renderViews(){
const profileRows=data.profiles.map(p=>[p.full_name||"",p.role||"",nameIn("customers",p.customer_id),fullName(p.employee_id),p.id]);
const customerRows=data.customers.map(c=>[c.name,c.contact_name||"",c.email||"",c.status||"active"]);
const facilityRows=data.facilities.map(f=>[f.name,nameIn("customers",f.customer_id),f.address||"",f.status||"active"]);
const areaRows=data.areas.map(a=>[a.name,nameIn("facilities",a.facility_id),a.area_type||"",a.instructions||""]);
const employeeRows=data.employees.map(e=>[e.full_name,e.email||"",e.phone||"",e.status||"active",profileName(e.profile_id)]);
const jobRows=data.jobs.map(j=>[j.title,nameIn("customers",j.customer_id),nameIn("facilities",j.facility_id),nameIn("areas",j.area_id),fullName(j.employee_id),j.status||"scheduled"]);
const checklistRows=data.checklist_items.map(i=>[jobTitle(i.job_id),i.label,i.required?"Yes":"No",i.requires_photo?"Yes":"No",i.completed?"Completed":"Open"]);
const inspectionRows=data.inspections.map(i=>[jobTitle(i.job_id),i.score||"",i.customer_visible?"Yes":"No",i.manager_notes||""]);
const issueRows=data.maintenance_issues.map(i=>[i.title,nameIn("facilities",i.facility_id),nameIn("areas",i.area_id),i.status||"open",i.customer_visible?"Yes":"No"]);
const quoteRows=data.quotes.map(q=>[q.title||issueTitle(q.issue_id),issueTitle(q.issue_id),q.amount||0,q.status||"draft"]);
const invRows=data.inventory_items.map(i=>[i.name,nameIn("facilities",i.facility_id),i.category||"",i.quantity||0,i.min_quantity||0]);
const photoRows=data.photos.map(p=>[p.type||"",jobTitle(p.job_id),issueTitle(p.issue_id),p.public_url||p.file_path||""]);
document.getElementById("views").innerHTML=`
<div id="dashboard" class="view"><div class="grid metrics">${cardMetric("Users",data.profiles.length,"profiles")}${cardMetric("Customers",data.customers.length,"live")}${cardMetric("Facilities",data.facilities.length,"by customer")}${cardMetric("Open issues",data.maintenance_issues.filter(i=>(i.status||"open")==="open").length,"by area")}</div><div class="grid two" style="margin-top:16px"><div class="card"><h2>Latest Issues</h2>${table(["Issue","Facility","Area","Status","Customer visible"],issueRows)}</div><div class="card"><h2>Access structure</h2><p class="muted">auth.users = login only. profiles = app role and access. Link profile to customer_id or employee_id.</p></div></div></div>
<div id="users" class="view"><div class="card"><h2>Profiles / App Users</h2>${table(["Name","Role","Customer Link","Employee Link","Auth User ID"],profileRows)}</div>${profileForms()}</div>
<div id="customers" class="view"><div class="card"><h2>Customers</h2>${table(["Customer","Contact","Email","Status"],customerRows)}</div>${customerForm()}</div>
<div id="facilities" class="view"><div class="card"><h2>Facilities</h2>${table(["Facility","Customer","Address","Status"],facilityRows)}</div>${facilityForm()}</div>
<div id="areas" class="view"><div class="card"><h2>Facility Areas</h2>${table(["Area","Facility","Type","Instructions"],areaRows)}</div>${areaForm()}</div>
<div id="employees" class="view"><div class="card"><h2>Employees</h2>${table(["Name","Email","Phone","Status","Profile Link"],employeeRows)}</div>${employeeForm()}</div>
<div id="jobs" class="view"><div class="card"><h2>Jobs</h2>${table(["Job","Customer","Facility","Area","Employee","Status"],jobRows)}</div>${jobForm()}</div>
<div id="checklists" class="view"><div class="card"><h2>Checklist Items</h2>${table(["Job","Task","Required","Photo","Status"],checklistRows)}</div>${checklistForm()}</div>
<div id="inspections" class="view"><div class="card"><h2>Inspections</h2>${table(["Job","Score","Customer visible","Notes"],inspectionRows)}</div>${inspectionForm()}</div>
<div id="maintenance" class="view"><div class="card"><h2>Maintenance Issues</h2>${table(["Issue","Facility","Area","Status","Customer visible"],issueRows)}</div>${issueForm()}</div>
<div id="quotes" class="view"><div class="card"><h2>Quotes</h2>${table(["Quote","Issue","Amount","Status"],quoteRows)}</div>${quoteForm()}</div>
<div id="inventory" class="view"><div class="card"><h2>Inventory</h2>${table(["Item","Facility","Category","Qty","Min"],invRows)}</div>${inventoryForm()}</div>
<div id="photos" class="view"><div class="card"><h2>Photos</h2>${table(["Type","Job","Issue","URL/path"],photoRows)}</div>${photoForm()}</div>
<div id="settings" class="view"><div class="grid two"><div class="card"><h2>Supabase</h2><p class="muted">Run v4 schema. Auth users are in Supabase Authentication → Users.</p><button class="btn primary" onclick="loadAll()">Test / Refresh</button></div><div class="card"><h2>Mobile menu</h2><p class="muted">On phones, tap ☰ Menu to open the sidebar.</p></div></div></div>
<div id="customer-home" class="view"><div class="grid metrics">${cardMetric("Service visits",data.jobs.length,"visible later")}${cardMetric("Open approvals",data.quotes.filter(q=>(q.status||"draft")==="sent").length,"quotes")}${cardMetric("Issues",data.maintenance_issues.length,"reviewed")}${cardMetric("Reports",data.inspections.length,"inspections")}</div></div>
<div id="customer-jobs" class="view"><div class="card"><h2>Service Visits</h2>${table(["Job","Customer","Facility","Area","Employee","Status"],jobRows)}</div></div>
<div id="customer-issues" class="view"><div class="card"><h2>Issues & Approvals</h2>${table(["Issue","Facility","Area","Status","Customer visible"],issueRows)}</div><div class="card" style="margin-top:16px"><h2>Quotes</h2>${table(["Quote","Issue","Amount","Status"],quoteRows)}</div></div>
<div id="customer-reports" class="view"><div class="card"><h2>Reports</h2>${table(["Job","Score","Customer visible","Notes"],inspectionRows)}</div></div>
<div id="employee-today" class="view"><div class="card"><h2>Assigned Jobs</h2>${table(["Job","Customer","Facility","Area","Employee","Status"],jobRows)}</div></div>
<div id="employee-checklist" class="view"><div class="card"><h2>Checklist</h2>${table(["Job","Task","Required","Photo","Status"],checklistRows)}</div></div>
<div id="employee-photos" class="view">${photoForm()}</div>
<div id="employee-issues" class="view">${issueForm()}</div>
<div id="employee-time" class="view"><div class="card"><h2>Time Clock</h2><p class="muted">Clock-in/out table is the next add-on.</p><button class="btn primary">Clock In</button></div></div>`}
function profileForms(){return`<div class="grid two" style="margin-top:16px"><div class="card"><h2>Create My Profile</h2><p class="muted">Use this after login to create your app profile connected to your Supabase auth user.</p><div class="form"><input id="myName" placeholder="Your full name"><button class="btn primary" onclick="createMyProfile()">Create/Update My Creator Profile</button></div></div><div class="card"><h2>Assign Access</h2><div class="form"><select id="profileId">${opts(data.profiles,p=>(p.full_name||p.id)+" · "+(p.role||""))}</select><input id="profileName" placeholder="Full name"><select id="profileRole"><option>creator</option><option>admin</option><option>manager</option><option>customer</option><option>employee</option><option>vendor</option></select><select id="profileCustomer"><option value="">No customer link</option>${opts(data.customers,c=>c.name)}</select><select id="profileEmployee"><option value="">No employee link</option>${opts(data.employees,e=>e.full_name)}</select><button class="btn primary" onclick="updateProfileAccess()">Update Access</button></div></div></div>`}
function customerForm(){return`<div class="card" style="margin-top:16px"><h2>Add Customer</h2><div class="form"><div class="form-row"><input id="custName" placeholder="Customer name"><input id="custContact" placeholder="Contact name"><input id="custEmail" placeholder="Email"><input id="custPhone" placeholder="Phone"></div><button class="btn primary" onclick="insertRow('customers',{name:val('custName'),contact_name:val('custContact'),email:val('custEmail'),phone:val('custPhone'),status:'active'})">Save Customer</button></div></div>`}
function facilityForm(){return`<div class="card" style="margin-top:16px"><h2>Add Facility</h2><div class="form"><div class="form-row"><select id="facCustomer">${opts(data.customers,c=>c.name)}</select><input id="facName" placeholder="Facility name"><input id="facAddress" placeholder="Address"><input id="facNotes" placeholder="Access/service notes"></div><button class="btn primary" onclick="insertRow('facilities',{customer_id:val('facCustomer'),name:val('facName'),address:val('facAddress'),access_notes:val('facNotes'),status:'active'})">Save Facility</button></div></div>`}
function areaForm(){return`<div class="card" style="margin-top:16px"><h2>Add Area</h2><div class="form"><div class="form-row"><select id="areaFacility">${opts(data.facilities,f=>f.name)}</select><input id="areaName" placeholder="Area name"><input id="areaType" placeholder="Type"><input id="areaInstructions" placeholder="Instructions"></div><button class="btn primary" onclick="insertRow('facility_areas',{facility_id:val('areaFacility'),name:val('areaName'),area_type:val('areaType'),instructions:val('areaInstructions')})">Save Area</button></div></div>`}
function employeeForm(){return`<div class="card" style="margin-top:16px"><h2>Add Employee</h2><div class="form"><div class="form-row"><input id="empName" placeholder="Full name"><input id="empEmail" placeholder="Email"><input id="empPhone" placeholder="Phone"><input id="empRole" placeholder="Role"><select id="empProfile"><option value="">No login profile</option>${opts(data.profiles,p=>p.full_name||p.id)}</select></div><button class="btn primary" onclick="insertRow('employees',{full_name:val('empName'),email:val('empEmail'),phone:val('empPhone'),role:val('empRole'),profile_id:valOrNull('empProfile'),status:'active'})">Save Employee</button></div></div>`}
function jobForm(){return`<div class="card" style="margin-top:16px"><h2>Add Job</h2><div class="form"><div class="form-row"><input id="jobTitle" placeholder="Job title"><select id="jobCustomer">${opts(data.customers,c=>c.name)}</select><select id="jobFacility">${opts(data.facilities,f=>f.name)}</select><select id="jobArea"><option value="">Optional area</option>${opts(data.areas,a=>a.name)}</select><select id="jobEmployee"><option value="">Unassigned</option>${opts(data.employees,e=>e.full_name)}</select><input id="jobDate" type="datetime-local"></div><button class="btn primary" onclick="insertRow('jobs',{title:val('jobTitle'),customer_id:val('jobCustomer'),facility_id:val('jobFacility'),area_id:valOrNull('jobArea'),employee_id:valOrNull('jobEmployee'),scheduled_at:valOrNull('jobDate'),status:'scheduled'})">Save Job</button></div></div>`}
function checklistForm(){return`<div class="card" style="margin-top:16px"><h2>Add Checklist Item</h2><div class="form"><div class="form-row"><select id="checkJob">${opts(data.jobs,j=>j.title)}</select><input id="checkLabel" placeholder="Task label"><select id="checkRequired"><option value="true">Required</option><option value="false">Optional</option></select><select id="checkPhoto"><option value="false">No photo</option><option value="true">Requires photo</option></select></div><button class="btn primary" onclick="insertRow('checklist_items',{job_id:val('checkJob'),label:val('checkLabel'),required:val('checkRequired')==='true',requires_photo:val('checkPhoto')==='true',completed:false})">Save Task</button></div></div>`}
function inspectionForm(){return`<div class="card" style="margin-top:16px"><h2>Add Inspection</h2><div class="form"><div class="form-row"><select id="inspJob">${opts(data.jobs,j=>j.title)}</select><input id="inspScore" type="number" placeholder="Score 0-100"><select id="inspVisible"><option value="false">Internal only</option><option value="true">Customer visible</option></select><input id="inspNotes" placeholder="Manager notes"></div><button class="btn primary" onclick="insertRow('inspections',{job_id:val('inspJob'),score:Number(val('inspScore')||0),customer_visible:val('inspVisible')==='true',manager_notes:val('inspNotes')})">Save Inspection</button></div></div>`}
function issueForm(){return`<div class="card" style="margin-top:16px"><h2>Add Maintenance Issue</h2><div class="form"><div class="form-row"><input id="issueTitle" placeholder="Issue title"><select id="issueFacility">${opts(data.facilities,f=>f.name)}</select><select id="issueArea"><option value="">Optional area</option>${opts(data.areas,a=>a.name)}</select><select id="issueJob"><option value="">Optional job</option>${opts(data.jobs,j=>j.title)}</select></div><textarea id="issueDesc" placeholder="Description"></textarea><button class="btn primary" onclick="insertRow('maintenance_issues',{title:val('issueTitle'),facility_id:val('issueFacility'),area_id:valOrNull('issueArea'),job_id:valOrNull('issueJob'),description:val('issueDesc'),status:'open',customer_visible:false})">Save Issue</button></div></div>`}
function quoteForm(){return`<div class="card" style="margin-top:16px"><h2>Add Quote</h2><div class="form"><div class="form-row"><select id="quoteIssue">${opts(data.maintenance_issues,i=>i.title)}</select><input id="quoteTitle" placeholder="Quote title"><input id="quoteAmount" type="number" placeholder="Amount"><select id="quoteStatus"><option>draft</option><option>sent</option><option>approved</option><option>rejected</option><option>scheduled</option><option>completed</option></select></div><button class="btn primary" onclick="insertRow('quotes',{issue_id:val('quoteIssue'),title:val('quoteTitle'),amount:Number(val('quoteAmount')||0),status:val('quoteStatus')})">Save Quote</button></div></div>`}
function inventoryForm(){return`<div class="card" style="margin-top:16px"><h2>Add Inventory Item</h2><div class="form"><div class="form-row"><select id="invFacility">${opts(data.facilities,f=>f.name)}</select><input id="invName" placeholder="Item name"><input id="invCategory" placeholder="Category"><input id="invQty" type="number" placeholder="Quantity"><input id="invMin" type="number" placeholder="Minimum"><input id="invUnit" placeholder="Unit"></div><button class="btn primary" onclick="insertRow('inventory_items',{facility_id:val('invFacility'),name:val('invName'),category:val('invCategory'),quantity:Number(val('invQty')||0),min_quantity:Number(val('invMin')||0),unit:val('invUnit')||'each'})">Save Inventory</button></div></div>`}
function photoForm(){return`<div class="card" style="margin-top:16px"><h2>Add Photo Record</h2><p class="muted">This saves the photo URL/path record. Supabase Storage upload is next.</p><div class="form"><div class="form-row"><input id="photoType" placeholder="Type"><select id="photoJob"><option value="">Optional job</option>${opts(data.jobs,j=>j.title)}</select><select id="photoIssue"><option value="">Optional issue</option>${opts(data.maintenance_issues,i=>i.title)}</select><input id="photoUrl" placeholder="Public URL or file path"></div><button class="btn primary" onclick="insertRow('photos',{type:val('photoType'),job_id:valOrNull('photoJob'),issue_id:valOrNull('photoIssue'),public_url:val('photoUrl')})">Save Photo Record</button></div></div>`}
function val(id){return document.getElementById(id)?.value||""} function valOrNull(id){const v=val(id);return v===""?null:v}
async function signUp(){const {data:res,error}=await sb.auth.signUp({email:val("email"),password:val("password")});document.getElementById("authMsg").textContent=error?error.message:"Account created. Now login or confirm email if required.";}
async function signIn(){const {data:res,error}=await sb.auth.signInWithPassword({email:val("email"),password:val("password")});if(error){document.getElementById("authMsg").textContent=error.message;return} sessionUser=res.user;document.getElementById("authMsg").textContent="Logged in as "+sessionUser.email;await loadAll();}
async function signOut(){await sb.auth.signOut();sessionUser=null;document.getElementById("authMsg").textContent="Logged out."}
async function getSession(){const {data:res}=await sb.auth.getSession();sessionUser=res.session?.user||null;if(sessionUser)document.getElementById("authMsg").textContent="Logged in as "+sessionUser.email;}
function quickAdd(){if(currentRole==="creator")showView("users");if(currentRole==="customer")showView("customer-issues");if(currentRole==="employee")showView("employee-issues")}
renderNav();renderViews();showView(currentView);getSession().then(loadAll);
</script>
</body></html>
