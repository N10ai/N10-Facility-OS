<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FacilityOS AI</title>
<meta name="theme-color" content="#ef3b1f">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#09090b;--panel:rgba(24,24,27,.82);--line:rgba(255,255,255,.10);--text:#f8fafc;--muted:#a1a1aa;--muted2:#71717a;--accent:#ef3b1f;--accent2:#ff5a2e;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--r:22px;--shadow:0 24px 80px rgba(0,0,0,.46)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 15% 10%,rgba(239,59,31,.22),transparent 30%),linear-gradient(160deg,#030304,#111114 52%,#09090b)}
button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:288px 1fr;min-height:100vh}aside{position:sticky;top:0;height:100vh;padding:22px;border-right:1px solid var(--line);background:rgba(10,10,12,.78);backdrop-filter:blur(24px)}main{padding:26px;overflow:hidden}
.logo{height:48px;display:flex;align-items:center;gap:12px;margin-bottom:24px}.mark{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--accent),#ff7a4e);display:grid;place-items:center;font-weight:900;box-shadow:0 16px 40px rgba(239,59,31,.33)}.logo strong{font-size:21px;letter-spacing:-.04em}.logo small{display:block;color:var(--muted);font-size:11px}
.label{color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.12em;margin:18px 10px 8px}.role-switch{padding:6px;background:rgba(255,255,255,.06);border:1px solid var(--line);display:grid;gap:6px;border-radius:18px;margin-bottom:18px}
.role-btn,.nav-btn{width:100%;text-align:left;border:0;cursor:pointer;color:var(--muted);background:transparent;border-radius:14px;padding:12px 13px;display:flex;gap:10px;align-items:center}.role-btn.active,.nav-btn.active{color:var(--text);background:linear-gradient(135deg,rgba(239,59,31,.24),rgba(255,255,255,.07));box-shadow:inset 0 0 0 1px rgba(239,59,31,.22)}nav{display:grid;gap:5px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}.headline h1{margin:0;font-size:clamp(28px,4vw,48px);letter-spacing:-.06em}.headline p{margin:8px 0 0;color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}.pill,.btn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:999px;padding:10px 14px;display:inline-flex;gap:8px;align-items:center}.btn{cursor:pointer}.btn.primary{border-color:rgba(239,59,31,.48);background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 14px 38px rgba(239,59,31,.24)}.btn.ghost{background:transparent}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);backdrop-filter:blur(26px)}.card h2,.card h3{margin:0 0 10px;letter-spacing:-.035em}.grid{display:grid;gap:16px}.metrics{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:1.15fr .85fr}.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.num{font-size:34px;font-weight:850;letter-spacing:-.06em}.muted{color:var(--muted)}.trend{color:var(--accent2);font-size:12px;margin-top:8px}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:13px 8px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-size:12px}td{color:#e5e7eb}.tag{display:inline-flex;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--muted);font-size:12px}.tag.ok{background:rgba(34,197,94,.14);color:#86efac}.tag.warn{background:rgba(245,158,11,.14);color:#fcd34d}.tag.red{background:rgba(239,59,31,.16);color:#fca5a5}
.list{display:grid;gap:12px}.item{padding:14px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045)}.item strong{display:block}.item small{color:var(--muted);display:block;margin-top:4px}.form{display:grid;gap:12px}.form-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}input,select,textarea{width:100%;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--line);border-radius:15px;padding:13px 14px;outline:none}textarea{min-height:96px;resize:vertical}.view{display:none;animation:fade .22s ease}.view.active{display:block}@keyframes fade{from{opacity:.4;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.dot{width:9px;height:9px;border-radius:50%;background:var(--red);display:inline-block}.dot.ok{background:var(--green)}.mobilebar{display:none;position:sticky;top:0;z-index:10;padding:12px;background:rgba(9,9,11,.86);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}.progress{height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px}.upload{border:1px dashed rgba(255,255,255,.22);border-radius:20px;padding:24px;text-align:center;color:var(--muted);background:rgba(255,255,255,.035)}.login{max-width:460px;margin:0 0 24px auto}
@media(max-width:980px){.app{grid-template-columns:1fr}aside{display:none}.mobilebar{display:flex;justify-content:space-between;gap:8px}main{padding:16px}.metrics,.two,.three,.form-row{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.login{margin:0 0 18px}}
</style>
</head>
<body>
<div class="mobilebar"><button class="btn ghost" onclick="cycleRole()">Switch Role</button><button class="btn primary" onclick="quickAdd()">+ Quick Add</button></div>
<div class="app">
<aside>
<div class="logo"><div class="mark">AI</div><div><strong>FacilityOS</strong><small>Cleaning + Facility Intelligence</small></div></div>
<div class="label">View as</div>
<div class="role-switch">
<button class="role-btn active" data-role="creator" onclick="setRole('creator')">👑 Creator / Admin</button>
<button class="role-btn" data-role="customer" onclick="setRole('customer')">🏢 Customer Portal</button>
<button class="role-btn" data-role="employee" onclick="setRole('employee')">🧽 Employee App</button>
</div>
<div class="label">Modules</div><nav id="nav"></nav>
<div class="card" style="margin-top:18px;padding:14px"><span id="connectionDot" class="dot"></span> <span id="connectionText" class="muted" style="font-size:13px">Checking Supabase...</span></div>
</aside>
<main>
<section class="card login" id="authCard">
<h2>Workspace Login</h2><p class="muted">Supabase is connected. Create or login with email/password after running the SQL schema.</p>
<div class="form"><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password">
<div class="actions"><button class="btn primary" onclick="signUp()">Create account</button><button class="btn" onclick="signIn()">Login</button><button class="btn ghost" onclick="signOut()">Logout</button></div><small id="authMsg" class="muted"></small></div>
</section>
<div class="topbar"><div class="headline"><h1 id="pageTitle"></h1><p id="pageSubtitle"></p></div><div class="actions"><span class="pill" id="rolePill">👑 Creator View</span><button class="btn primary" onclick="quickAdd()">+ Quick Add</button></div></div>
<section id="views"></section>
</main>
</div>
<script>
const SUPABASE_URL="https://sjjeqxjsspcaxommavac.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6InNqamVxeGpzc3BjYXhvbW1hdmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjY4NDYsImV4cCI6MjA5ODgwMjg0Nn0.MIHJgK5co1NCepS9FkzLtxvCN39cOhE2N0m9RMkInM4";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const roleNav={creator:[["dashboard","Dashboard"],["customers","Customers"],["facilities","Facilities"],["jobs","Jobs & Schedule"],["employees","Employees"],["inspections","Inspections"],["maintenance","Maintenance"],["quotes","Quotes"],["inventory","Inventory"],["reports","Reports"],["settings","Settings"]],customer:[["customer-home","Overview"],["customer-jobs","Service Visits"],["customer-issues","Issues & Approvals"],["customer-reports","Reports"],["customer-billing","Billing"]],employee:[["employee-today","Today"],["employee-checklist","Checklist"],["employee-photos","Photos"],["employee-issues","Report Issue"],["employee-time","Time Clock"]]};
let currentRole="creator",currentView="dashboard";
const jobs=[["MIP Office Night Cleaning","Today 7:30 PM","Assigned","Carlos","92% checklist"],["Medical Office Deep Clean","Tomorrow 6:00 PM","Scheduled","Ana","Photos required"],["Lobby Detail - Coral Way","Friday 8:00 PM","Open","Unassigned","Monthly"]];
const customers=[["MIP Cargo Express","2 active facilities","$1,850/mo","Active"],["Coral Way Medical","1 facility","$1,200/mo","Active"],["Brickell Office Group","Proposal","$2,600/mo","Lead"]];
const issues=[["Loose zinc faucet","Restroom 2","Quote pending","$145"],["Ceiling light not working","Lobby","Customer approval","$95"],["Paper towel dispenser broken","Kitchen","Open","$65"]];
function iconFor(id){const m={dashboard:"📊",customers:"🤝",facilities:"🏢",jobs:"🗓️",employees:"👥",inspections:"✅",maintenance:"🔧",quotes:"💵",inventory:"🧴",reports:"📈",settings:"⚙️","customer-home":"🏠","customer-jobs":"🧽","customer-issues":"⚠️","customer-reports":"📄","customer-billing":"💳","employee-today":"📍","employee-checklist":"✅","employee-photos":"📸","employee-issues":"🔧","employee-time":"⏱️"};return m[id]||"•"}
function setRole(role){currentRole=role;currentView=roleNav[role][0][0];document.querySelectorAll(".role-btn").forEach(b=>b.classList.toggle("active",b.dataset.role===role));document.getElementById("rolePill").textContent=role==="creator"?"👑 Creator View":role==="customer"?"🏢 Customer View":"🧽 Employee View";renderNav();renderViews();showView(currentView)}
function cycleRole(){const r=["creator","customer","employee"];setRole(r[(r.indexOf(currentRole)+1)%r.length])}
function renderNav(){document.getElementById("nav").innerHTML=roleNav[currentRole].map(([id,l])=>`<button class="nav-btn ${id===currentView?'active':''}" onclick="showView('${id}')" data-view="${id}"><span>${iconFor(id)}</span>${l}</button>`).join("")}
function showView(id){currentView=id;document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===id));document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===id));const t={dashboard:["Creator Command Center","Full business control: revenue, jobs, customers, employees, quality, issues, and reports."],customers:["Customers","Accounts, contracts, contacts, facilities, and value."],facilities:["Facilities","Buildings, rooms, areas, access notes, and recurring scope."],jobs:["Jobs & Schedule","Create recurring cleanings, assign employees, and track completion."],employees:["Employees","Team roles, assignments, accountability, and performance."],inspections:["Inspections","Quality scoring, required photos, and manager review."],maintenance:["Maintenance Opportunities","Turn facility problems into approved outsourced services."],quotes:["Quotes","Customer approvals for handyman, plumbing, electrical, and add-ons."],inventory:["Inventory","Supplies, chemicals, paper goods, and reorder alerts."],reports:["Reports","Customer-facing proof and internal KPIs."],settings:["Settings","Brand, roles, Supabase, and permissions."],"customer-home":["Customer Portal","Customer sees service proof, issues, approvals, reports, and billing."],"customer-jobs":["Service Visits","Scheduled and completed cleanings with notes and proof."],"customer-issues":["Issues & Approvals","Approve, reject, or schedule maintenance opportunities."],"customer-reports":["Reports","Monthly facility scorecards and photo reports."],"customer-billing":["Billing","Contracts, invoices, and approved extras."],"employee-today":["Employee App","Cleaner sees only today’s jobs and execution steps."],"employee-checklist":["Cleaning Checklist","Step-by-step execution with required completion."],"employee-photos":["Photo Upload","Before, after, damage, and supply photos."],"employee-issues":["Report Issue","Submit facility issues for manager review."],"employee-time":["Time Clock","Clock in/out and GPS-ready attendance."]}[id]||["FacilityOS",""];document.getElementById("pageTitle").textContent=t[0];document.getElementById("pageSubtitle").textContent=t[1]}
function metric(l,n,t){return `<div class="card"><div class="num">${n}</div><div class="muted">${l}</div><div class="trend">${t}</div></div>`}
function tag(c){let s=String(c);if(["Active","Completed","Assigned"].includes(s))return`<span class="tag ok">${s}</span>`;if(["Scheduled","Quote pending","Customer approval","Lead"].includes(s))return`<span class="tag warn">${s}</span>`;if(["Open","Unassigned"].includes(s))return`<span class="tag red">${s}</span>`;return s}
function table(h,r){return`<table><thead><tr>${h.map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${r.map(row=>`<tr>${row.map(c=>`<td>${tag(c)}</td>`).join("")}</tr>`).join("")}</tbody></table>`}
function moduleTable(title,h,r){return`<div class="card"><h2>${title}</h2>${table(h,r)}</div>`}
function list(items){return`<div class="list">${items.map(i=>`<div class="item">${i}</div>`).join("")}</div>`}
function cards(a){let h=[];for(let i=0;i<a.length;i+=2)h.push(`<div class="card"><h2>${a[i]}</h2><p class="muted">${a[i+1]||""}</p></div>`);return`<div class="grid three">${h.join("")}</div>`}
function form(title,fields){return`<div class="card" style="margin-top:16px"><h2>${title}</h2><div class="form"><div class="form-row">${fields.map(f=>`<input placeholder="${f}">`).join("")}</div><button class="btn primary" onclick="alert('Next step: map this form to its Supabase table.')">Save</button></div></div>`}
function issueForm(){return`<div class="card" style="margin-top:16px"><h2>Report facility issue</h2><div class="form"><div class="form-row"><input id="issueTitle" placeholder="Issue title"><input id="issueLocation" placeholder="Location"></div><textarea id="issueDesc" placeholder="Describe the issue"></textarea><input type="file" accept="image/*"><button class="btn primary" onclick="saveIssue()">Create issue</button></div></div>`}
function renderViews(){document.getElementById("views").innerHTML=`
<div id="dashboard" class="view"><div class="grid metrics">${metric("Monthly recurring revenue","$5,650","+18% pipeline")}${metric("Active facilities","4","2 pending proposals")}${metric("Jobs this week","18","94% on-time")}${metric("Open issues","3","$305 quote value")}</div><div class="grid two" style="margin-top:16px"><div class="card"><h2>Owner priorities</h2>${table(["Job","Time","Status","Employee","Note"],jobs)}</div><div class="card"><h2>Revenue opportunities</h2>${list(issues.map(i=>`<strong>${i[0]}</strong><small>${i[1]} · ${i[2]} · ${i[3]}</small>`))}</div></div></div>
<div id="customers" class="view">${moduleTable("Customers",["Customer","Facilities","Value","Status"],customers)}${form("Add customer",["Customer name","Contact email","Phone","Monthly value"])}</div>
<div id="facilities" class="view">${cards(["Facility database","Address, access codes, floor maps, room lists, supply closets, and special instructions.","Area map","Restrooms, lobby, offices, kitchen, floors, trash zones, and high-touch points.","Service plan","Daily, weekly, monthly, and deep-cleaning scope by area."])}</div>
<div id="jobs" class="view">${moduleTable("Jobs & Schedule",["Job","Time","Status","Employee","Completion"],jobs)}${form("Create cleaning job",["Customer","Facility","Date/time","Assign employee"])}</div>
<div id="employees" class="view">${cards(["Employee accountability","Role, assignments, time clock, checklists completed, photo compliance, and issue reports.","Performance score","Missed steps, late jobs, complaints, and positive reviews.","Training center","SOPs as short task cards instead of long documents."])}</div>
<div id="inspections" class="view"><div class="grid two"><div class="card"><h2>Inspection score</h2><div class="num" style="font-size:64px">96%</div><div class="progress"><span style="width:96%"></span></div><p class="muted">Restrooms, floors, trash, kitchen, and high-touch areas passed.</p></div><div class="card"><h2>Required checks</h2>${list(["Restroom sanitized","Trash removed","Floors mopped","Doors/glass cleaned","Photos uploaded"].map(x=>`<strong>✅ ${x}</strong><small>Employee confirmation required</small>`))}</div></div></div>
<div id="maintenance" class="view">${moduleTable("Maintenance Issues",["Issue","Location","Status","Estimate"],issues)}${issueForm()}</div>
<div id="quotes" class="view">${cards(["Quote pipeline","Draft, sent, approved, rejected, scheduled, completed.","Customer approval buttons","Approve / Reject / Schedule from the customer portal.","Vendor dispatch","Later assign plumber, electrician, HVAC, or handyman partner."])}</div>
<div id="inventory" class="view">${cards(["Supplies","Paper towels, toilet paper, trash bags, soap, chemicals.","Reorder alerts","Minimum levels by facility and customer.","Usage tracking","Cleaner reports low supplies during job completion."])}</div>
<div id="reports" class="view">${cards(["Monthly facility score","Cleaning completed, photos, inspections, open issues, resolved issues.","Customer PDF report","Premium proof so the customer feels professional value.","Internal KPI report","On-time rate, missed items, maintenance revenue."])}</div>
<div id="settings" class="view"><div class="grid two"><div class="card"><h2>Brand</h2><p class="muted">Accent color updated to a redder orange: <strong style="color:var(--accent)">#ef3b1f</strong></p><div style="height:110px;border-radius:22px;background:linear-gradient(135deg,#ef3b1f,#ff5a2e)"></div></div><div class="card"><h2>Supabase</h2><p class="muted">Project URL connected. Run the SQL schema first.</p><button class="btn primary" onclick="testSupabase()">Test connection</button></div></div></div>
<div id="customer-home" class="view"><div class="grid metrics">${metric("This month","12 visits","100% completed")}${metric("Facility score","96%","+4 vs last month")}${metric("Open approvals","2","$240 value")}${metric("Photos","86","Proof available")}</div><div class="card" style="margin-top:16px"><h2>Customer visibility rule</h2><p class="muted">Customer sees service status, reports, issues, approvals, and invoices. They do not see margins, payroll, employee performance, or admin settings.</p></div></div>
<div id="customer-jobs" class="view">${moduleTable("Your Service Visits",["Service","Date","Status","Proof","Notes"],[["Night Cleaning","Today","Completed","12 photos","No issues"],["Deep Clean","Friday","Scheduled","Required","Lobby/floors"]])}</div>
<div id="customer-issues" class="view"><div class="grid two"><div class="card"><h2>Pending approvals</h2>${list(issues.map(i=>`<strong>${i[0]} · ${i[3]}</strong><small>${i[1]} · ${i[2]}</small><div class="actions" style="margin-top:10px"><button class="btn primary">Approve</button><button class="btn">Reject</button><button class="btn ghost">Schedule</button></div>`))}</div><div class="card"><h2>Portal rule</h2><p class="muted">Customer sees issues only after manager review.</p></div></div></div>
<div id="customer-reports" class="view">${cards(["Facility score: 96%","All scheduled services completed this month.","Photos available","Before/after and issue photos by visit.","Recommendations","2 small maintenance opportunities identified."])}</div>
<div id="customer-billing" class="view">${cards(["Current contract","$1,850/month recurring cleaning service.","Approved extras","$145 faucet repair pending schedule.","Invoices","Later connect Stripe or QuickBooks."])}</div>
<div id="employee-today" class="view"><div class="grid two"><div class="card"><h2>Today's assignment</h2><h3>MIP Office Night Cleaning</h3><p class="muted">7:30 PM · 2 offices · Restrooms, lobby, trash, floors, kitchen.</p><button class="btn primary">Start job</button></div><div class="card"><h2>Employee visibility rule</h2><p class="muted">Employee sees assigned jobs, checklist, photos, issue reporting, and time clock only.</p></div></div></div>
<div id="employee-checklist" class="view"><div class="card"><h2>Job checklist</h2>${list(["Clock in at facility","Take before photos","Empty trash","Clean restrooms","Sanitize high-touch areas","Mop floors","Take after photos","Report issues","Submit job"].map(x=>`<label style="display:flex;gap:10px;align-items:center"><input type="checkbox" style="width:18px"><strong>${x}</strong></label><small>Required step</small>`))}</div></div>
<div id="employee-photos" class="view"><div class="card"><h2>Photo proof</h2><div class="upload"><input type="file" multiple accept="image/*"><p>Upload before, after, damage, and supply photos.</p></div><p class="muted">Next version stores files in Supabase Storage by job ID.</p></div></div>
<div id="employee-issues" class="view">${issueForm()}</div>
<div id="employee-time" class="view">${cards(["Clock in","GPS-ready clock-in before starting a facility.","Break / travel","Track paid time clearly.","Clock out","Require checklist and photos before completion."])}</div>`}
async function testSupabase(){try{const r=await sb.auth.getSession();if(r.error)throw r.error;document.getElementById("connectionDot").className="dot ok";document.getElementById("connectionText").textContent="Supabase connected";document.getElementById("authMsg").textContent="Supabase connection works."}catch(e){document.getElementById("connectionDot").className="dot";document.getElementById("connectionText").textContent="Supabase check failed";document.getElementById("authMsg").textContent=e.message}}
async function signUp(){const email=document.getElementById("email").value,password=document.getElementById("password").value;const{error}=await sb.auth.signUp({email,password});document.getElementById("authMsg").textContent=error?error.message:"Account created. Check email if confirmation is enabled."}
async function signIn(){const email=document.getElementById("email").value,password=document.getElementById("password").value;const{error}=await sb.auth.signInWithPassword({email,password});document.getElementById("authMsg").textContent=error?error.message:"Logged in.";testSupabase()}
async function signOut(){await sb.auth.signOut();document.getElementById("authMsg").textContent="Logged out."}
async function saveIssue(){const title=document.getElementById("issueTitle")?.value||"Untitled issue",location=document.getElementById("issueLocation")?.value||"",description=document.getElementById("issueDesc")?.value||"";try{const{error}=await sb.from("maintenance_issues").insert({title,location,description,status:"open"});if(error)throw error;alert("Issue saved to Supabase.")}catch(e){alert("Could not save yet: "+e.message+"\nRun supabase-schema.sql and check policies.")}}
function quickAdd(){if(currentRole==="creator")showView("jobs");if(currentRole==="customer")showView("customer-issues");if(currentRole==="employee")showView("employee-issues")}
renderNav();renderViews();showView(currentView);testSupabase();
</script>
</body>
</html>
